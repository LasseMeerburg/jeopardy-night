<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy Night</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Peer-to-peer buzzers (phones) and QR join code. Loaded from cdnjs; the game still runs without them. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --board-blue:#060CE9; --board-blue-dark:#0509a8;
    --cell-top:#0a18d8; --cell-bot:#060ca6;
    --gold:#d69f4c; --gold-bright:#f3c172;
    --ink:#03051c; --ink-2:#080c2c;
    --white:#ffffff; --answered:#05083f; --line:#0a1180;
    --good:#27c08a; --good-dark:#16855f; --bad:#ef5364; --bad-dark:#b23142;
    --panel:#0c1136; --panel-2:#151b50; --muted:#9aa3d4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #11185a 0%, var(--ink) 60%), var(--ink);
    color:var(--white);font-family:"Oswald",system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  .ui{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:system-ui,sans-serif;}
  :focus-visible{outline:3px solid var(--gold-bright);outline-offset:2px;}
  #app{max-width:1180px;margin:0 auto;padding:22px 16px 60px;}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand h1{font-family:"Anton",sans-serif;font-weight:400;letter-spacing:.5px;font-size:clamp(30px,5vw,52px);color:var(--gold);margin:0;line-height:.9;text-shadow:0 3px 0 #7a5a23,0 5px 14px rgba(0,0,0,.5);}
  .brand .tag{color:var(--muted);font-weight:400;text-transform:uppercase;letter-spacing:3px;font-size:12px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:10px;font-weight:600;letter-spacing:.4px;background:linear-gradient(180deg,#1a2270,#11185a);color:#fff;border:1px solid #2a3490;transition:transform .12s ease,filter .12s ease,background .12s ease;text-transform:uppercase;font-size:14px;}
  .btn:hover{filter:brightness(1.12);transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn.gold{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#241a06;border-color:#b9863a;}
  .btn.good{background:linear-gradient(180deg,var(--good),var(--good-dark));border-color:#0f6347;color:#04231a;}
  .btn.bad{background:linear-gradient(180deg,var(--bad),var(--bad-dark));border-color:#8c2532;}
  .btn.ghost{background:transparent;border:1px solid #2a3490;color:#cdd3ff;}
  .btn.ghost:hover{background:#10165a;}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:8px;}
  .btn.big{padding:16px 26px;font-size:17px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none;}

  .card{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid #232a6b;border-radius:16px;padding:18px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .spread{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  h2.section{font-family:"Anton",sans-serif;font-weight:400;letter-spacing:.5px;text-transform:uppercase;color:#fff;margin:0 0 12px;font-size:24px;}
  .muted{color:var(--muted);}
  label.field{display:block;margin:0 0 10px;}
  label.field span{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px;}
  input.txt,textarea.txt,select.txt{width:100%;background:#0a0f3a;border:1px solid #2a3380;border-radius:9px;color:#fff;padding:10px 12px;font-size:15px;}
  textarea.txt{resize:vertical;min-height:64px;line-height:1.35;}

  /* home */
  .home-hero{text-align:center;padding:34px 16px 8px;}
  .home-hero .big{font-family:"Anton",sans-serif;font-size:clamp(54px,12vw,128px);line-height:.86;color:var(--gold);text-shadow:0 6px 0 #7a5a23,0 10px 26px rgba(0,0,0,.55);letter-spacing:1px;}
  .home-hero .sub{color:#c9d0ff;text-transform:uppercase;letter-spacing:6px;font-size:13px;margin-top:14px;}
  .home-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:30px 0 10px;}
  .games-list{display:grid;gap:10px;margin-top:6px;}
  .game-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#0a0f3a;border:1px solid #232a6b;border-radius:12px;padding:12px 14px;}
  .game-item .gname{font-size:18px;font-weight:600;}
  .game-item .gmeta{font-size:12px;color:var(--muted);}
  .how{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:18px;}
  .how .step{background:#0a0f3a;border:1px solid #232a6b;border-radius:12px;padding:14px;}
  .how .step b{color:var(--gold-bright);}

  /* board */
  .board-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
  .round-chip{font-family:"Anton",sans-serif;font-size:22px;letter-spacing:.5px;color:var(--gold);text-transform:uppercase;}
  .board-scroll{overflow-x:auto;padding-bottom:8px;}
  .board{display:grid;grid-template-columns:repeat(6,minmax(108px,1fr));gap:7px;min-width:680px;background:#000;padding:7px;border-radius:10px;border:2px solid #000;}
  .cat-cell{background:linear-gradient(180deg,#0a16c4,#060c9c);border-radius:6px;min-height:84px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px 6px;text-transform:uppercase;font-weight:700;color:#fff;font-size:clamp(12px,1.4vw,16px);line-height:1.06;letter-spacing:.3px;text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .clue-cell{background:linear-gradient(180deg,var(--cell-top),var(--cell-bot));border-radius:6px;aspect-ratio:1.6/1;min-height:64px;display:flex;align-items:center;justify-content:center;font-family:"Anton",sans-serif;color:var(--gold);font-size:clamp(22px,3vw,38px);transition:transform .12s ease,filter .12s ease;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);text-shadow:0 2px 0 #6f4f1e,0 3px 8px rgba(0,0,0,.45);position:relative;}
  .clue-cell:hover{filter:brightness(1.18);transform:translateY(-2px);}
  .clue-cell.done{background:#05083a;color:transparent;cursor:default;pointer-events:none;box-shadow:none;text-shadow:none;}
  .clue-cell .mtag{position:absolute;top:5px;right:6px;font-family:system-ui,sans-serif;font-size:10px;color:#cdd3ff;opacity:.7;text-shadow:none;}
  .board-foot{margin-top:16px;}

  .scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:6px;}
  .pcard{background:#0a0f3a;border:1px solid #232a6b;border-radius:12px;padding:12px;position:relative;}
  .pcard.control{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset,0 0 18px rgba(214,159,76,.25);}
  .pcard .pname{font-weight:600;font-size:16px;display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pcard .pscore{font-family:"Anton",sans-serif;font-size:30px;color:var(--gold);margin-top:2px;}
  .pcard .pscore.neg{color:var(--bad);}
  .pcard .ptag{font-size:11px;color:var(--muted);margin-top:2px;}
  .ctrl-tag{position:absolute;top:-9px;right:10px;background:var(--gold);color:#241a06;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:20px;text-transform:uppercase;}
  .pcard .mini{position:absolute;top:8px;right:8px;display:flex;gap:4px;}
  .pcard .mini button{font-size:14px;width:24px;height:24px;border-radius:6px;background:#11185a;border:1px solid #2a3490;line-height:1;}
  .net-chip{display:inline-flex;align-items:center;gap:7px;font-family:system-ui,sans-serif;font-size:12px;color:#cdd3ff;background:#0a0f3a;border:1px solid #232a6b;border-radius:20px;padding:5px 11px;}
  .dot{width:9px;height:9px;border-radius:50%;background:#5a6;display:inline-block;}
  .dot.off{background:#566;} .dot.on{background:var(--good);box-shadow:0 0 8px var(--good);} .dot.wait{background:var(--gold-bright);}

  /* clue overlay */
  .overlay{position:fixed;inset:0;background:var(--board-blue);display:flex;flex-direction:column;z-index:50;animation:zoomIn .22s ease;}
  .overlay.dd{background:linear-gradient(135deg,#0a16c4 0%,#060c9c 100%);}
  @keyframes zoomIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  .ov-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;color:#cfe;}
  .ov-top .where{text-transform:uppercase;letter-spacing:2px;font-size:13px;color:#bfe;opacity:.85;}
  .ov-top .val{font-family:"Anton",sans-serif;font-size:28px;color:var(--gold);}
  .ov-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px 26px;gap:20px;overflow:auto;}
  .clue-text{font-family:"Oswald",sans-serif;font-weight:500;text-transform:uppercase;font-size:clamp(24px,4.8vw,58px);line-height:1.16;max-width:1000px;text-shadow:0 3px 10px rgba(0,0,0,.4);}
  .answer-text{font-family:"Oswald",sans-serif;font-weight:700;color:var(--gold-bright);text-transform:uppercase;font-size:clamp(22px,4vw,46px);line-height:1.1;max-width:1000px;border-top:3px solid rgba(255,255,255,.25);padding-top:16px;}
  .clue-media{max-height:40vh;max-width:92%;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.45);background:#fff2;}
  .clue-audio{width:min(520px,90vw);height:46px;}
  .media-fail{font-family:system-ui,sans-serif;font-size:14px;color:#ffd2d2;background:rgba(0,0,0,.25);padding:8px 12px;border-radius:8px;}
  .dd-splash{font-family:"Anton",sans-serif;color:var(--gold);font-size:clamp(46px,12vw,120px);text-shadow:0 6px 0 #6f4f1e,0 10px 26px rgba(0,0,0,.5);letter-spacing:2px;animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(.6);opacity:0;}70%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
  .ov-foot{padding:14px 20px 22px;display:flex;flex-direction:column;gap:12px;background:rgba(0,0,0,.18);}
  .judge{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;}
  .jrow{display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 10px;}
  .jrow .jn{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .jrow .jb{display:flex;gap:6px;}
  .center{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;}

  /* buzzers in clue */
  .buzz-status{font-family:"Anton",sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:clamp(18px,2.4vw,26px);color:#dfe;}
  .buzz-status.armed{color:var(--good);}
  .buzz-winner{font-family:"Anton",sans-serif;font-size:clamp(30px,6vw,64px);color:var(--gold);text-transform:uppercase;text-shadow:0 4px 0 #6f4f1e;animation:pop .3s ease;}
  .buzz-players{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .buzzbtn{display:inline-flex;flex-direction:column;align-items:center;gap:3px;min-width:104px;padding:12px 16px;border-radius:12px;background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#241a06;border:1px solid #b9863a;font-weight:700;text-transform:uppercase;font-size:15px;transition:transform .1s ease,filter .1s ease;}
  .buzzbtn:hover{filter:brightness(1.08);transform:translateY(-2px);}
  .buzzbtn .khint{font-family:system-ui,sans-serif;font-size:11px;background:#241a0633;border:1px solid #241a0644;border-radius:5px;padding:1px 6px;}
  .buzzbtn.out{background:#2a2f55;color:#7c84b8;border-color:#333a66;cursor:not-allowed;}
  .buzzbtn.out:hover{transform:none;filter:none;}

  /* timer */
  .timer{display:flex;align-items:center;gap:10px;color:#dfe;font-weight:600;}
  .timer .bar{height:10px;width:220px;max-width:46vw;background:rgba(0,0,0,.3);border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.2);}
  .timer .fill{height:100%;background:linear-gradient(90deg,var(--good),var(--gold-bright));width:100%;transition:width 1s linear;}
  .timer .fill.low{background:linear-gradient(90deg,var(--bad),#ff9d6b);}

  /* editor */
  .ed-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 16px;}
  .ed-tabs button{padding:9px 14px;border-radius:9px;background:#0a0f3a;border:1px solid #232a6b;color:#cdd3ff;text-transform:uppercase;font-weight:600;font-size:13px;letter-spacing:.5px;}
  .ed-tabs button.active{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#241a06;border-color:#b9863a;}
  .cats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;}
  .catbox{background:#0a0f3a;border:1px solid #232a6b;border-radius:12px;padding:12px;}
  .cluebox{border-top:1px solid #1c2360;padding-top:10px;margin-top:10px;}
  .cluebox .vrow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
  .cluebox .val{font-family:"Anton",sans-serif;color:var(--gold);font-size:20px;}
  .ddtoggle{display:flex;align-items:center;gap:7px;font-size:12px;color:#cdd3ff;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;}
  .ddtoggle input{width:16px;height:16px;accent-color:var(--gold);}
  .ddtoggle.on{color:var(--gold-bright);font-weight:700;}
  .media-row{display:flex;gap:8px;align-items:center;margin:8px 0 4px;flex-wrap:wrap;}
  .media-row select{flex:0 0 auto;width:auto;background:#0a0f3a;border:1px solid #2a3380;border-radius:8px;color:#fff;padding:8px 10px;font-size:13px;}
  .media-url{flex:1 1 160px;}
  .media-preview{margin-top:6px;}
  .media-preview img{max-height:90px;border-radius:8px;border:1px solid #2a3380;}
  .media-preview audio{width:100%;height:38px;}

  /* setup */
  .players-edit{display:grid;gap:10px;max-width:560px;}
  .pe-row{display:flex;gap:8px;align-items:center;}
  .pe-row .num{width:30px;text-align:center;color:var(--muted);font-weight:700;}
  .pe-row .keyhint{font-family:system-ui,sans-serif;font-size:11px;color:var(--muted);white-space:nowrap;}

  /* final */
  .final-wrap{max-width:900px;margin:0 auto;text-align:center;}
  .final-cat{font-family:"Anton",sans-serif;color:var(--gold);font-size:clamp(30px,6vw,64px);text-transform:uppercase;text-shadow:0 4px 0 #6f4f1e;margin:10px 0 4px;}
  .wager-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;text-align:left;margin-top:14px;}
  .wbox{background:#0a0f3a;border:1px solid #232a6b;border-radius:12px;padding:12px;}
  .wbox .wn{font-weight:600;margin-bottom:2px;}
  .wbox .wmax{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .results-table{width:100%;border-collapse:collapse;margin-top:10px;text-align:left;}
  .results-table th,.results-table td{padding:10px 12px;border-bottom:1px solid #232a6b;}
  .results-table th{color:var(--muted);text-transform:uppercase;font-size:12px;letter-spacing:1px;}
  .results-table td.score{font-family:"Anton",sans-serif;color:var(--gold);font-size:22px;}
  .winner-banner{font-family:"Anton",sans-serif;font-size:clamp(34px,7vw,72px);color:var(--gold);text-transform:uppercase;text-shadow:0 5px 0 #6f4f1e,0 9px 22px rgba(0,0,0,.5);margin:8px 0;}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(2,4,18,.72);display:flex;align-items:center;justify-content:center;z-index:80;padding:18px;animation:zoomIn .18s ease;}
  .modal-card{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid #2a3490;border-radius:18px;padding:22px;max-width:560px;width:100%;max-height:90vh;overflow:auto;}
  .qr-wrap{display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center;}
  #qrbox{background:#fff;padding:10px;border-radius:12px;width:200px;height:200px;display:flex;align-items:center;justify-content:center;}
  #qrbox img,#qrbox canvas{display:block;}
  .roomcode{font-family:"Anton",sans-serif;font-size:46px;letter-spacing:6px;color:var(--gold);text-align:center;}
  .joinurl{font-family:system-ui,sans-serif;font-size:13px;word-break:break-all;background:#0a0f3a;border:1px solid #2a3380;border-radius:9px;padding:9px 11px;color:#cdd3ff;}
  .conn-list{display:grid;gap:6px;margin-top:8px;}
  .conn-item{display:flex;align-items:center;gap:8px;font-size:14px;background:#0a0f3a;border:1px solid #232a6b;border-radius:9px;padding:7px 10px;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#0a0f3a;border:1px solid var(--gold);color:#fff;padding:12px 18px;border-radius:12px;z-index:95;box-shadow:0 10px 30px rgba(0,0,0,.5);font-weight:600;}

  /* phone controller */
  .ctrl-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center;gap:18px;}
  .ctrl-title{font-family:"Anton",sans-serif;color:var(--gold);font-size:44px;line-height:.9;text-shadow:0 4px 0 #7a5a23;}
  .ctrl-status{font-family:system-ui,sans-serif;font-size:16px;color:#cdd3ff;min-height:24px;}
  .ctrl-buzz{width:min(78vw,320px);height:min(78vw,320px);border-radius:50%;font-family:"Anton",sans-serif;font-size:clamp(40px,12vw,64px);text-transform:uppercase;color:#241a06;background:radial-gradient(circle at 35% 30%,#ffd98a,var(--gold) 70%);border:6px solid #b9863a;box-shadow:0 14px 40px rgba(0,0,0,.5),inset 0 -8px 18px rgba(0,0,0,.18);transition:transform .08s ease,filter .12s ease;}
  .ctrl-buzz:active{transform:scale(.96);}
  .ctrl-buzz:disabled{background:radial-gradient(circle at 35% 30%,#3a4170,#262c52 70%);color:#7c84b8;border-color:#333a66;box-shadow:none;cursor:not-allowed;}
  .ctrl-buzz.in{background:radial-gradient(circle at 35% 30%,#7ef0c0,var(--good) 70%);color:#04231a;border-color:#0f6347;}
  .ctrl-name{font-weight:700;font-size:20px;}
  .ctrl-score{font-family:"Anton",sans-serif;font-size:30px;color:var(--gold);}

  /* answer clock + buzz order */
  .ansclock{font-family:"Anton",sans-serif;font-size:clamp(22px,3vw,34px);color:var(--gold-bright);background:#0a0f3a;border:2px solid #2a3490;border-radius:10px;padding:2px 12px;margin-left:14px;min-width:64px;display:inline-block;text-align:center;}
  .ansclock.low{color:#fff;background:#7a1d1d;border-color:#b33;animation:pulse .6s ease infinite;}
  @keyframes pulse{50%{transform:scale(1.08);}}
  .buzz-order{font-family:"Inter",system-ui,sans-serif;font-size:13px;color:#bcc4ff;text-align:center;margin:8px 0 2px;min-height:16px;}
  .buzz-order .rt{color:var(--gold);}

  /* mirrored clue on the phone */
  .ctrl-clue{width:min(92vw,420px);background:#0a0f3a;border:1px solid #2a3490;border-radius:14px;padding:14px 16px;margin:4px 0 6px;}
  .ctrl-clue-head{font-family:"Inter",system-ui,sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:6px;}
  .ctrl-clue-img{max-width:100%;max-height:180px;border-radius:8px;display:block;margin:0 auto 8px;}
  .ctrl-clue-note{font-size:13px;color:#9aa3d8;margin-bottom:6px;}
  .ctrl-clue-text{font-size:16px;line-height:1.35;color:#eef;}
  .ctrl-clue-ans{margin-top:8px;padding-top:8px;border-top:1px solid #1c2360;color:var(--gold-bright);font-weight:600;}

  /* editor copy/paste + options */
  .btn.xs{padding:3px 8px;font-size:11px;border-radius:7px;}
  .catbox-head{display:flex;align-items:flex-end;gap:8px;}
  .copy-row{display:flex;gap:6px;margin:6px 0 2px;}
  .clue-tools{display:flex;gap:4px;flex-wrap:wrap;}
  .opt-row{display:flex;gap:10px;align-items:flex-start;margin:10px 0;line-height:1.4;cursor:pointer;}
  .opt-row input{margin-top:3px;width:18px;height:18px;accent-color:var(--gold);flex:none;}
  .opt-row span{font-size:14px;color:#dfe3ff;}

/* =======================================================================

const VALUES = { 0:[200,400,600,800,1000], 1:[400,800,1200,1600,2000] };

/* Connection servers for the phone <-> host link.
   STUN (below) is free and needs no account; it is enough on home Wi-Fi and phone hotspots.
   To get through a locked-down network like school / eduroam Wi-Fi, you need a relay (TURN).
   Easiest free option (about 5 minutes, no card):
     1. Make a free account at https://www.metered.ca/ (Open Relay).
     2. In the dashboard, copy your TURN credentials API URL. It looks like:
          https://YOURAPP.metered.live/api/v1/turn/credentials?apiKey=YOUR_KEY
     3. Paste that whole URL between the quotes in TURN_FETCH_URL below, then redeploy.
   The app then fetches fresh relay servers (including the firewall-friendly TLS port 443)
   whenever someone connects. Leave it blank to stay STUN-only (hotspot / home Wi-Fi). */
const TURN_FETCH_URL = "https://supperclub.metered.live/api/v1/turn/credentials?apiKey=2dc62abb8ba1b171c5228347ba6528c3a8e5";
/* Alternatively, paste static relay entries here instead of using TURN_FETCH_URL: */
const EXTRA_ICE = [
  // { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "YOUR_USER", credential: "YOUR_PASS" },
];
const ICE_SERVERS = [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
  { urls: "stun:stun.cloudflare.com:3478" },
  ...EXTRA_ICE
];
/* Fetch TURN credentials once (cached) and merge with the STUN list above. */
let _icePromise = null;
function ensureIce(){
  if(_icePromise) return _icePromise;
  _icePromise = (async ()=>{
    let servers = ICE_SERVERS.slice();
    if(TURN_FETCH_URL){
      try{
        const r = await fetch(TURN_FETCH_URL);
        if(r.ok){ const arr = await r.json(); if(Array.isArray(arr) && arr.length) servers = servers.concat(arr); }
      }catch(e){}
    }
    return servers;
  })();
  return _icePromise;
}
function peerOpts(servers){ return { debug:1, config:{ iceServers: servers } }; }

/* Wager rules: nobody can ever wager a negative amount.
   Everyone can always wager up to BET_FLOOR regardless of score, and higher if their
   score (or, for a Daily Double, the top clue value) exceeds it.
   Daily Double minimum is WAGER_MIN; Final Jeopardy minimum is 0 (you may decline to bet). */
const WAGER_MIN = 5;
const BET_FLOOR = 1000;
const ANSWER_SECONDS = 10; // answer clock once someone buzzes in
function clampWager(w, lo, hi){ w = parseInt(w,10); if(isNaN(w)) w = lo; if(w < lo) w = lo; if(w > hi) w = hi; return w; }

/* Game options (house rules), with safe defaults. */

function defaultOpt(){ return { penalty:true, randomDD:false, cats:6, base:200 }; }
function catCount(){ const n=parseInt(opt().cats,10); return (isNaN(n)?6:Math.max(2,Math.min(6,n))); }
function roundValues(ri){ const base=parseInt(opt().base,10)||200; const mult=ri===0?1:2; return [1,2,3,4,5].map(n=>n*mult*base); }

/* =======================================================================
   Storage (persistent when available; JSON export/import always works)
   ======================================================================= */
const Store = (function(){
  const mem = {}; let memIndex = [];
  const hasStorage = (typeof window!=="undefined") && window.storage && typeof window.storage.get==="function";
  async function readIndex(){
    if(!hasStorage) return memIndex.slice();
    try{ const r=await window.storage.get("jeopardy:index"); return r&&r.value?JSON.parse(r.value):[]; }catch(e){ return []; }
  }
  async function writeIndex(idx){ if(!hasStorage){memIndex=idx.slice();return;} try{ await window.storage.set("jeopardy:index",JSON.stringify(idx)); }catch(e){} }
  return {
    available:hasStorage,
    async list(){ const idx=await readIndex(); idx.sort((a,b)=>(b.updated||0)-(a.updated||0)); return idx; },
    async save(id,game){
      const now=Date.now();
      if(hasStorage){ try{ await window.storage.set("jeopardy:game:"+id,JSON.stringify(game)); }catch(e){ throw e; } }
      else mem[id]=JSON.parse(JSON.stringify(game));
      const idx=await readIndex(); const f=idx.find(g=>g.id===id);
      if(f){f.title=game.title;f.updated=now;} else idx.push({id,title:game.title,updated:now});
      await writeIndex(idx);
    },
    async load(id){
      if(hasStorage){ try{ const r=await window.storage.get("jeopardy:game:"+id); return r&&r.value?JSON.parse(r.value):null; }catch(e){ return null; } }
      return mem[id]?JSON.parse(JSON.stringify(mem[id])):null;
    },
    async remove(id){
      if(hasStorage){ try{ await window.storage.delete("jeopardy:game:"+id); }catch(e){} } else delete mem[id];
      const idx=(await readIndex()).filter(g=>g.id!==id); await writeIndex(idx);
    }
  };
})();

  const pasteClue = state.clip.clue ? "" : "disabled";
  body.innerHTML = `
    <p class="muted ui" style="margin:0 0 10px;font-size:13px;">Showing ${n} categories (change this in Options). Use Copy and Paste to reuse a category or clue.</p>
    <div class="cats-grid ui">

        <div class="catbox">

          </div>
          <div class="copy-row">
            <button class="btn ghost xs" data-act="cat-copy" data-r="${ri}" data-c="${ci}">Copy category</button>

          </div>
          ${cat.clues.map((clue,ii)=>{
            const val=vals[ii];
            const attrs=`data-r="${ri}" data-c="${ci}" data-i="${ii}"`;
            return `
            <div class="cluebox">
              <div class="vrow">
                <span class="val">$${val}</span>
                <label class="ddtoggle ${clue.dailyDouble?"on":""}" data-ddlabel ${attrs}>
                  <input type="checkbox" data-dd ${attrs} ${clue.dailyDouble?"checked":""}> Daily Double</label>
                <span class="clue-tools">
                  <button class="btn ghost xs" data-act="clue-copy" ${attrs} title="Copy this clue">Copy</button>
                  <button class="btn ghost xs" data-act="clue-paste" ${attrs} ${pasteClue} title="Paste copied clue">Paste</button>
                  <button class="btn ghost xs" data-act="clue-clear" ${attrs} title="Clear this clue">Clear</button>
                </span>
              </div>
              <label class="field"><span>Clue</span>
                <textarea class="txt" data-clue ${attrs} data-field="clue" placeholder="Write the clue">${esc(clue.clue)}</textarea></label>
              ${mediaControls("c", attrs, clue.mediaType||"none", clue.media||"")}
              <label class="field" style="margin-top:8px;margin-bottom:2px;"><span>Response (form of a question)</span>
                <input class="txt" type="text" data-clue ${attrs} data-field="answer" value="${esc(clue.answer)}" placeholder="What is ...?"></label>
            </div>`;

}

  const net=state.net;
  const netDot = net.status==="on"?"on":net.status==="connecting"?"wait":"off";
  const netText = net.status==="on"?`Phone buzzers on - ${net.count} connected` : net.status==="connecting"?"Phone buzzers connecting..." : "Phone buzzers off";
  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><h1>PLAYERS</h1><span class="tag">${esc(g.title)}</span></div>
      <div class="row" style="align-items:center;">

/* ---------- BOARD ---------- */
function renderBoard(){
  const g=state.game, ri=state.round;
  const n=catCount(); const cats=g.rounds[ri].categories.slice(0,n);
  const vals=roundValues(ri);
  const remaining=countRemaining(ri);
  const nextLabel = ri===0?"Go to Double Jeopardy":"Go to Final Jeopardy";
  const net=state.net;
  const netDot = net.status==="on"?"on":net.status==="connecting"?"wait":"off";
  const netText = net.status==="on"?`Phone buzzers on - ${net.count} connected` : net.status==="connecting"?"Phone buzzers connecting..." : "Phone buzzers off";
  const undoBtn = state.undo.length ? `<button class="btn ghost sm" data-act="undo" title="Undo the last score change">Undo</button>` : "";
  app.innerHTML = `
    <div class="board-head">
      <div class="brand"><h1 style="font-size:34px;">JEOPARDY</h1></div>
      <div class="row" style="align-items:center;">
        <span class="round-chip">${ROUND_NAMES[ri]} round</span>
        <button class="net-chip" data-act="open-room"><span class="dot ${netDot}"></span>${netText}</button>
        <button class="btn ghost sm" data-act="spin-first" title="Pick who chooses first">Who starts?</button>
        <button class="btn ghost sm" data-act="toggle-sound" title="Toggle sound">Sound: ${Sound.on?"on":"off"}</button>
        <button class="btn ghost sm" data-act="quit">Quit</button>
        <button class="btn gold sm" data-act="next-round">${nextLabel}</button>
      </div>
    </div>
    <div class="board-scroll">
      <div class="board" style="grid-template-columns:repeat(${n},minmax(108px,1fr));min-width:${n*112}px;">
        ${cats.map(c=>`<div class="cat-cell">${esc(c.title||"\u00A0")}</div>`).join("")}
        ${vals.map((val,ii)=>cats.map((cat,ci)=>{
          const clue=cat.clues[ii]; const done=clue.answered;
          const has=(clue.clue||"").trim()||(clue.answer||"").trim()||(clue.media||"").trim();
          if(done||!has) return `<div class="clue-cell done"></div>`;
          const mtag = clue.mediaType==="image"?`<span class="mtag">image</span>`:clue.mediaType==="audio"?`<span class="mtag">audio</span>`:"";
          return `<div class="clue-cell" data-act="open-clue" data-r="${ri}" data-c="${ci}" data-i="${ii}">$${val}${mtag}</div>`;
        }).join("")).join("")}
      </div>
    </div>
    <div class="board-foot">
      <div class="spread"><h2 class="section" style="margin:0;">Scores</h2>
        <span class="row" style="align-items:center;gap:10px;">
          ${undoBtn}
          <span class="muted ui" style="font-size:12px;">${remaining} clue${remaining===1?"":"s"} left. Tap a name to give board control.</span>
        </span></div>
      <div class="scores" id="scores"></div>
    </div>
    ${net.showModal?roomModal():""}`;
  renderScores();
  if(net.showModal) mountQR();
}
function renderScores(){
  const box=$("#scores"); if(!box) return;
  box.innerHTML = state.players.map((p,i)=>`
    <div class="pcard ${i===state.controlling?"control":""}" data-act="give-control" data-i="${i}">
      ${i===state.controlling?`<span class="ctrl-tag">control</span>`:""}
      <div class="mini"><button data-act="score-minus" data-i="${i}" title="Subtract 100">-</button><button data-act="score-plus" data-i="${i}" title="Add 100">+</button></div>
      <div class="pname">${esc(p.name)}</div>
      <div class="pscore ${p.score<0?"neg":""}">${money(p.score)}</div>
      <div class="ptag">key ${BUZZ_KEYS[i]||"-"}${p.phone?" &middot; phone":""}${p.connected===false?" &middot; offline":""}</div>
    </div>`).join("");
}
function countRemaining(ri){
  let n=0; const cc=catCount();
  state.game.rounds[ri].categories.slice(0,cc).forEach(cat=>cat.clues.forEach(c=>{
    const has=(c.clue||"").trim()||(c.answer||"").trim()||(c.media||"").trim(); if(has&&!c.answered)n++; })); return n;
}

/* ---------- ROOM MODAL (phone buzzers) ---------- */
function roomModal(){
  const net=state.net;
  const isFile = location.protocol==="file:";
  const noLib = (typeof Peer==="undefined");
  let inner;
  if(isFile){
    inner = `
      <h2 class="section">Phone buzzers need a web address</h2>
      <p class="ui" style="color:#cdd3ff;line-height:1.5;">This file is open from your computer (a <b>file://</b> link), and phone browsers block buzzer connections on local files.
      To use phones, put <b>jeopardy.html</b> on any free static host that gives an <b>https</b> link, for example GitHub Pages, Netlify, or Cloudflare Pages, then open that link here and on the phones.</p>
      <p class="ui" style="color:#cdd3ff;">In the meantime, the <b>keyboard keys</b> (1 to ${state.players.length}) and the <b>on-screen buzz buttons</b> work right now.</p>
      <div class="center" style="margin-top:14px;"><button class="btn gold" data-act="close-room">Got it</button></div>`;
  } else if(noLib){
    inner = `
      <h2 class="section">Buzzer library did not load</h2>
      <p class="ui" style="color:#cdd3ff;">The phone-connection library could not load (no internet, or it was blocked). Keyboard and on-screen buzzers still work.</p>
      <div class="center" style="margin-top:14px;"><button class="btn gold" data-act="close-room">Close</button></div>`;
  } else {
    const url = joinURL(net.code||"");
    inner = `
      <h2 class="section">Buzz in from your phone</h2>
      <p class="ui" style="color:#cdd3ff;margin-top:-6px;">Players scan this code (or open the link), type a name, and tap Buzz. Best on the same Wi-Fi as this screen.</p>
      <div class="qr-wrap">
        <div id="qrbox">${net.status!=="on"?"<span class='ui' style='color:#333'>...</span>":""}</div>
        <div style="flex:1;min-width:200px;">
          <div class="ui" style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">Room code</div>
          <div class="roomcode">${esc(net.code||"....")}</div>
          <div class="joinurl">${esc(url)}</div>
          <div class="ui" style="margin-top:8px;font-size:13px;color:${net.status==="on"?"var(--good)":"var(--gold-bright)"};">
            ${net.status==="on"?("Ready - "+net.count+" phone"+(net.count===1?"":"s")+" connected") : net.status==="connecting"?"Connecting to the buzzer service..." : net.status==="error"?"Could not start. Try again, or use keyboard buzzers." : ""}
          </div>
        </div>
      </div>
      <div class="conn-list">
        ${state.players.filter(p=>p.phone).map(p=>`<div class="conn-item"><span class="dot ${p.connected===false?"off":"on"}"></span>${esc(p.name)}${p.connected===false?" (offline)":""}</div>`).join("") || `<div class="ui muted" style="font-size:13px;">No phones connected yet.</div>`}
      </div>
      <label class="mirror-row ui">
        <input type="checkbox" data-act="toggle-mirror" ${net.mirror?"checked":""}>
        <span>Show the clue text and image on players' phones (handy in a big room). Daily Doubles stay hidden.</span>
      </label>
      <div class="center" style="margin-top:16px;">
        ${net.status==="error"?`<button class="btn gold" data-act="retry-room">Try again</button>`:""}
        <button class="btn ghost" data-act="close-room">Close</button>
      </div>`;
  }
  return `<div class="modal" data-act="close-room-bg"><div class="modal-card ui" data-stop="1">${inner}</div></div>`;
}
function mountQR(){
  const box=$("#qrbox"); if(!box) return;
  if(typeof QRCode==="undefined" || !state.net.code || state.net.status!=="on") return;
  box.innerHTML="";
  try{ new QRCode(box,{text:joinURL(state.net.code),width:180,height:180,colorDark:"#06051c",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M}); }
  catch(e){ box.innerHTML=`<span class="ui" style="color:#333;font-size:12px;padding:8px;">Use the link below</span>`; }
}
function joinURL(code){ return location.origin + location.pathname + "#join=" + code; }

/* ---------- CLUE OVERLAY ---------- */
function renderClue(){
  const {ri,ci,ii}=state.clue;
  const clue=state.game.rounds[ri].categories[ci].clues[ii];
  const cat=state.game.rounds[ri].categories[ci].title||"";
  const val=roundValues(ri)[ii];

  if(clue.dailyDouble && state.ddStage){
    if(state.ddStage==="splash"){
      app.innerHTML = `
        <div class="overlay dd">
          <div class="ov-top"><span class="where">${esc(cat)}</span><span class="val">Daily Double</span></div>
          <div class="ov-body"><div class="dd-splash">DAILY DOUBLE!</div>
            <div class="muted ui" style="font-size:18px;">${esc(controllingName())} found it. Only they may answer.</div></div>
          <div class="ov-foot"><div class="center"><button class="btn gold big" data-act="dd-to-wager">Make a wager</button></div></div>
        </div>`;
      return;
    }
    if(state.ddStage==="wager"){
      const max=Math.max(BET_FLOOR, state.players[state.controlling].score, roundValues(ri)[4]);
      const min=Math.min(WAGER_MIN, max);
      const def=clampWager(val, min, max);
      app.innerHTML = `
        <div class="overlay dd">
          <div class="ov-top"><span class="where">${esc(cat)} - Daily Double</span><span class="val"></span></div>
          <div class="ov-body">
            <div class="clue-text" style="font-size:clamp(24px,4vw,42px);">${esc(controllingName())}, how much do you wager?</div>
            <div class="ui" style="display:flex;flex-direction:column;gap:8px;align-items:center;">
              <input class="txt" id="ddWagerInput" type="number" min="${min}" max="${max}" value="${def}" data-wmin="${min}" data-wmax="${max}" style="width:220px;font-size:26px;text-align:center;font-family:'Anton',sans-serif;color:var(--gold);">
              <div class="muted" style="font-size:13px;">Between ${money(min)} and ${money(max)} (your score or the top clue value).</div>
            </div>
          </div>
          <div class="ov-foot"><div class="center"><button class="btn gold big" data-act="dd-confirm-wager" data-min="${min}" data-max="${max}">Reveal the clue</button></div></div>
        </div>`;
      setTimeout(()=>{const el=$("#ddWagerInput"); if(el){el.focus();el.select();}},30);
      return;
    }
  }

  const isDD = clue.dailyDouble && state.ddStage==="play";
  const revealed = state.clueRevealed;
  const mediaHTML = clueMediaHTML(clue);
  const b = state.buzz;
  const winner = b.winner;
  const undoBtn = state.undo.length ? `<button class="btn ghost sm" data-act="undo">Undo</button>` : "";

  // footer content depends on phase
  let foot;
  if(isDD){
    foot = revealed
      ? `<div class="judge">${judgeRowsDD(val)}</div><div class="center">${undoBtn}<button class="btn good big" data-act="close-clue">Back to board</button></div>`
      : `<div class="center"><button class="btn ghost" data-act="timer-toggle">Start 30s timer</button><button class="btn gold big" data-act="reveal">Reveal answer</button></div>`;
  } else if(revealed){
    foot = `<div class="judge">${judgeRowsAll(val)}</div><div class="center">${undoBtn}<button class="btn good big" data-act="close-clue">Back to board</button></div>`;
  } else if(b.phase==="reading"){
    // brief pause before buzzers open automatically
    foot = `<div class="center"><div class="buzz-status">Get ready...</div></div>`;
  } else if(winner===null){
    // armed, waiting for a buzz
    foot = `
      <div class="center"><div class="buzz-status armed">Buzzers open - first to buzz is in</div></div>
      <div class="buzz-players">
        ${state.players.map((p,i)=> b.lockout.includes(i)
          ? `<button class="buzzbtn out" disabled>${esc(p.name)} <span class="khint">out</span></button>`
          : `<button class="buzzbtn" data-act="buzz" data-i="${i}">${esc(p.name)} <span class="khint">key ${BUZZ_KEYS[i]||"-"}</span></button>`
        ).join("")}
      </div>
      <div class="center"><button class="btn ghost" data-act="reveal">No one buzzed - reveal answer</button></div>`;
  } else {
    // someone buzzed in, not yet revealed: answer clock + order + judge
    const p=state.players[winner];
    foot = `
      <div class="center"><div class="buzz-winner">${esc(p.name)} is in!</div><span class="ansclock" id="answerClock">${ANSWER_SECONDS}s</span></div>
      <div class="buzz-order" id="buzzOrder">${buzzOrderHTML()}</div>
      <div class="center">
        <button class="btn good" data-act="buzz-correct" data-i="${winner}" data-amt="${val}">Correct +${money(val)}</button>
        <button class="btn bad" data-act="buzz-wrong" data-i="${winner}" data-amt="${val}">Wrong${opt().penalty!==false?" -"+money(val):""}</button>
        <button class="btn gold" data-act="reveal">Reveal answer</button>
        ${undoBtn}
      </div>`;
  }

  app.innerHTML = `
    <div class="overlay ${isDD?"dd":""}">
      <div class="ov-top"><span class="where">${esc(cat)}</span><span class="val">${isDD?("Wager "+money(state.ddWager)):money(val)}</span></div>
      <div class="ov-body">
        ${mediaHTML}
        <div class="clue-text">${esc(clue.clue||"")}</div>
        ${revealed?`<div class="answer-text">${esc(clue.answer||"(no response written)")}</div>`:`<div id="timerSlot"></div>`}
      </div>
      <div class="ov-foot">${foot}</div>
    </div>`;
}
function clueMediaHTML(clue){
  if(clue.mediaType==="image" && clue.media){
    return `<img class="clue-media" src="${esc(clue.media)}" alt="clue image" onerror="this.outerHTML='<div class=\\'media-fail\\'>Image could not load. Check the URL.</div>'">`;
  }
  if(clue.mediaType==="audio" && clue.media){
    return `<audio class="clue-audio" controls src="${esc(clue.media)}"></audio>`;
  }
  return "";
}
function judgeRowsAll(val){
  return state.players.map((p,i)=>`
    <div class="jrow"><span class="jn">${esc(p.name)} &middot; ${money(p.score)}</span>
      <span class="jb">
        <button class="btn good sm" data-act="judge" data-i="${i}" data-correct="1" data-amt="${val}">+${money(val)}</button>
        <button class="btn bad sm" data-act="judge" data-i="${i}" data-correct="0" data-amt="${val}">-${money(val)}</button>
      </span></div>`).join("");
}
function judgeRowsDD(val){
  const i=state.controlling, p=state.players[i];
  return `<div class="jrow"><span class="jn">${esc(p.name)} &middot; ${money(p.score)}</span>
    <span class="jb">
      <button class="btn good sm" data-act="judge" data-i="${i}" data-correct="1" data-amt="${state.ddWager}">Correct +${money(state.ddWager)}</button>
      <button class="btn bad sm" data-act="judge" data-i="${i}" data-correct="0" data-amt="${state.ddWager}">Wrong -${money(state.ddWager)}</button>
    </span></div>`;
}
function controllingName(){ return state.players[state.controlling]?state.players[state.controlling].name:"The leader"; }

/* ---------- FINAL ---------- */
function renderFinal(){
  const f=state.game.final, step=state.finalStep;
  if(step==="category"){
    app.innerHTML = wrapFinal(`
      <div class="muted ui" style="letter-spacing:4px;text-transform:uppercase;">Final Jeopardy</div>
      <div class="final-cat">${esc(f.category||"Final Category")}</div>
      <p class="ui" style="font-size:17px;color:#cdd3ff;">Everyone still in the game looks at the category and decides a secret wager. Write wagers down, then the host enters them.</p>
      <div class="center" style="margin-top:18px;"><button class="btn gold big" data-act="final-to-wager">Enter wagers</button></div>`);
    return;
  }
  if(step==="wager"){
    app.innerHTML = wrapFinal(`
      <div class="final-cat" style="font-size:clamp(24px,5vw,44px);">${esc(f.category||"Final Category")}</div>
      <p class="ui muted">Type each player's secret wager. Max is their current score (or 0 if not positive).</p>
      <div class="wager-grid">
        ${state.players.map((p,i)=>{ const max=Math.max(BET_FLOOR,p.score); return `
          <div class="wbox ui"><div class="wn">${esc(p.name)}</div><div class="wmax">${money(p.score)} now &middot; up to ${money(max)}</div>
            <input class="txt" type="number" min="0" max="${max}" value="${state.finalWagers[i]||0}" data-fwager data-i="${i}" data-max="${max}" data-wmin="0" data-wmax="${max}" style="font-family:'Anton',sans-serif;color:var(--gold);font-size:20px;text-align:center;"></div>`; }).join("")}
      </div>
      <div class="center" style="margin-top:18px;"><button class="btn gold big" data-act="final-reveal-clue">Lock wagers and show clue</button></div>`);
    return;
  }
  if(step==="clue"){
    app.innerHTML = `
      <div class="overlay">
        <div class="ov-top"><span class="where">Final Jeopardy - ${esc(f.category)}</span><span class="val"></span></div>
        <div class="ov-body">${clueMediaHTML(f)}<div class="clue-text">${esc(f.clue||"(no clue written)")}</div><div id="timerSlot"></div></div>
        <div class="ov-foot"><div class="center"><button class="btn ghost" data-act="timer-toggle">Start 30s timer</button><button class="btn gold big" data-act="final-to-reveal">Reveal answer</button></div></div>
      </div>`;
    return;
  }
  if(step==="reveal"){
    app.innerHTML = `
      <div class="overlay">
        <div class="ov-top"><span class="where">Final Jeopardy - ${esc(f.category)}</span><span class="val"></span></div>
        <div class="ov-body">${clueMediaHTML(f)}<div class="clue-text" style="font-size:clamp(22px,4vw,42px);">${esc(f.clue||"")}</div><div class="answer-text">${esc(f.answer||"(no response written)")}</div></div>
        <div class="ov-foot">
          <div class="judge">
            ${state.players.map((p,i)=>{ const w=state.finalWagers[i]||0; const oc=state.finalOutcomes[i];
              const live=state.finalBase[i]+(oc==="correct"?w:oc==="wrong"?-w:0);
              return `<div class="jrow"><span class="jn">${esc(p.name)} &middot; bet ${money(w)} &middot; <b style="color:var(--gold)">${money(live)}</b></span>
                <span class="jb"><button class="btn ${oc==="correct"?"good":"ghost"} sm" data-act="final-judge" data-i="${i}" data-oc="correct">Right</button>
                <button class="btn ${oc==="wrong"?"bad":"ghost"} sm" data-act="final-judge" data-i="${i}" data-oc="wrong">Wrong</button></span></div>`; }).join("")}
          </div>
          <div class="center"><button class="btn gold big" data-act="final-results">See final results</button></div>
        </div>
      </div>`;
    return;
  }

function wrapFinal(inner){

/* ---------- Who picks first (spinner overlay) ---------- */
function spinFirst(){
  const n=state.players.length; if(n<1) return;
  Sound.open();
  const host=document.createElement("div"); host.id="spinHost"; document.body.appendChild(host);
  let idx=Math.floor(Math.random()*n), ticks=0, total=16+Math.floor(Math.random()*(n+6)), delay=60;
  const draw=(winner)=>{
    host.innerHTML=`<div class="modal"><div class="modal-card ui" style="text-align:center;max-width:440px;">
      <h2 class="section">Who picks first?</h2>
      <div class="spin-list">${state.players.map((p,i)=>`<div class="spin-name ${i===idx?(winner?"win":"on"):""}">${esc(p.name)}</div>`).join("")}</div>
      ${winner?`<div class="center" style="margin-top:14px;"><button class="btn gold" id="spinDone">${esc(state.players[idx].name)} starts</button></div>`:`<div class="muted ui" style="margin-top:10px;font-size:13px;">Spinning...</div>`}
    </div></div>`;
    if(winner){ const b=host.querySelector("#spinDone"); if(b) b.onclick=()=>{ if(document.body.contains(host)) host.remove(); renderBoard(); }; }
  };
  draw(false);
  const step=()=>{
    idx=(idx+1)%n; ticks++; Sound.pick(); draw(false);
    if(ticks>=total){ state.controlling=idx; Sound.correct(); draw(true);
      setTimeout(()=>{ if(document.body.contains(host)){ host.remove(); renderBoard(); } }, 2600); return; }
    if(ticks>total-5) delay+=55; else if(ticks>total-9) delay+=20;
    setTimeout(step, delay);
  };
  setTimeout(step, delay);
}

function renderGameOver(){
  const ranked=state.players.map((p,i)=>({...p,i})).sort((a,b)=>b.score-a.score);
  const top=ranked[0];
  const tie = ranked.filter(p=>p.score===top.score).length>1;
  let banner;
  if(top.score<=0) banner="No winner this time";
  else if(tie) banner="It's a tie!";
  else banner=esc(top.name)+" wins!";
  // podium order: 2nd, 1st, 3rd
  const pods=[{p:ranked[1],place:2,h:120},{p:ranked[0],place:1,h:170},{p:ranked[2],place:3,h:90}];
  const podiumHTML = pods.map(s=> s.p ? `

    </div>` : `<div class="pod-col"><div class="pod-bar pod-empty" style="height:40px;"></div></div>`).join("");
  app.innerHTML = `
    <div class="topbar"><div class="brand"><h1>RESULTS</h1></div></div>
    <div class="card"><div class="final-wrap">

      <table class="results-table ui"><thead><tr><th>#</th><th>Player</th><th style="text-align:right;">Final score</th></tr></thead>
        <tbody>${ranked.map((p,r)=>`<tr><td>${r+1}</td><td>${esc(p.name)}</td><td class="score" style="text-align:right;${p.score<0?"color:var(--bad)":""}">${money(p.score)}</td></tr>`).join("")}</tbody></table>
      <div class="center" style="margin-top:20px;"><button class="btn gold big" data-act="play-again">Play this game again</button><button class="btn ghost big" data-act="quit">Home</button></div>

/* Synthesized sounds (no copyrighted material). Shared by host and phone. */
const Sound = {
  on:true, ctx:null,
  _ac(){ try{ if(!this.ctx){ const C=window.AudioContext||window.webkitAudioContext; if(!C) return null; this.ctx=new C(); } if(this.ctx.state==="suspended") this.ctx.resume(); return this.ctx; }catch(e){ return null; } },
  blip(freq,dur,type,vol,when){ if(!this.on) return; const ctx=this._ac(); if(!ctx) return; const t0=ctx.currentTime+(when||0);
    const o=ctx.createOscillator(), g=ctx.createGain(); o.type=type||"sine"; o.frequency.setValueAtTime(freq,t0); o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol||0.2,t0+0.015); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); o.start(t0); o.stop(t0+dur+0.03); },
  buzz(i){ const f=[523,587,659,698,784,880]; this.blip(f[(i||0)%f.length],0.18,"square",0.18); },
  correct(){ this.blip(660,0.12,"sine",0.2,0); this.blip(990,0.2,"sine",0.2,0.12); },
  wrong(){ this.blip(220,0.18,"sawtooth",0.16,0); this.blip(155,0.3,"sawtooth",0.16,0.16); },
  timesUp(){ this.blip(392,0.16,"square",0.2,0); this.blip(294,0.16,"square",0.2,0.18); this.blip(220,0.34,"square",0.2,0.36); },
  open(){ this.blip(740,0.07,"sine",0.14,0); this.blip(988,0.09,"sine",0.14,0.07); },
  daily(){ [523,659,784,1047].forEach((f,k)=>this.blip(f,0.12,"sine",0.2,k*0.11)); this.blip(1318,0.3,"sine",0.22,0.46); },
  round(){ this.blip(440,0.12,"sine",0.18,0); this.blip(659,0.2,"sine",0.18,0.12); },
  win(){ [523,659,784,1047].forEach((f,k)=>this.blip(f,0.16,"sine",0.22,k*0.13)); this.blip(784,0.28,"sine",0.2,0.56); this.blip(1047,0.5,"sine",0.24,0.7); },
  pick(){ this.blip(880,0.045,"square",0.1); }
};

/* =======================================================================
   Buzz logic (shared by phone, keyboard, on-screen)
   ======================================================================= */
function newBuzz(phase){ return {phase:phase||"idle", winner:null, order:[], times:{}, lockout:[], armAt:0, winnerAt:0}; }
function idleBuzzers(){ state.buzz=newBuzz("idle"); stopAnswerClock(); broadcastBuzz(); }
function readyBuzzers(){ state.buzz=newBuzz("reading"); stopAnswerClock(); broadcastBuzz(); } // clue open, host has not opened buzzers yet
function openBuzzers(){ // arm the buzzers (auto after a short delay, or re-open for a steal); keeps any lockout
  clearAutoArm();
  const b=state.buzz; b.phase="armed"; b.winner=null; b.order=[]; b.times={}; b.armAt=Date.now(); b.winnerAt=0;
  stopAnswerClock(); Sound.open(); broadcastBuzz(); renderClue();
}
function recordOrder(i){ const b=state.buzz; if(b.order.indexOf(i)>=0) return; const dt=b.armAt?Math.max(0,(Date.now()-b.armAt)/1000):0; b.order.push(i); b.times[i]=dt; }
function buzzIn(i, source){
  if(state.screen!=="clue" || state.clueRevealed) return;
  if(i<0 || i>=state.players.length) return;
  if(state.buzz.lockout.includes(i)) return;
  const b=state.buzz;
  if(b.phase==="armed" && b.winner===null){
    b.winner=i; b.phase="locked"; b.winnerAt=Date.now(); recordOrder(i);
    Sound.buzz(i); broadcastBuzz(); renderClue(); startAnswerClock(); return;
  }
  // capture near-simultaneous (in-flight) buzzes for the order list, briefly after the winner
  if(b.phase==="locked" && b.winner!==i && b.order.indexOf(i)<0 && (Date.now()-(b.winnerAt||0))<1800){
    recordOrder(i); broadcastBuzz(); updateOrderUI(); return;
  }
}
function buzzWrong(i, amt){
  pushUndo("score change");
  if(opt().penalty!==false) state.players[i].score -= amt;
  if(!state.buzz.lockout.includes(i)) state.buzz.lockout.push(i);
  state.buzz.winner=null; state.buzz.phase="armed"; state.buzz.order=[]; state.buzz.times={}; state.buzz.armAt=Date.now(); state.buzz.winnerAt=0;
  stopAnswerClock(); Sound.wrong(); broadcastBuzz(); renderClue();
}
function buzzCorrect(i, amt){
  pushUndo("score change");
  state.players[i].score += amt; state.lastCorrect=i;
  state.clueRevealed=true; Sound.correct(); idleBuzzers(); broadcastClue(); renderClue();
}
function buzzStateMsg(){
  const b=state.buzz, w=b.winner;
  let mode;
  if(w!==null) mode="locked";
  else if(b.phase==="armed" && !state.clueRevealed) mode="armed";
  else if(b.phase==="reading" && !state.clueRevealed) mode="reading";
  else mode="idle";
  return { type:"buzzstate", mode, winner:w, winnerName:(w!==null&&state.players[w])?state.players[w].name:"", lockout:b.lockout.slice() };
}
function broadcastBuzz(){
  if(!state.net.on) return;
  Net.broadcast(buzzStateMsg());
  pushScoresToPhones();
}
function buzzOrderHTML(){
  const b=state.buzz; if(!b.order || !b.order.length) return "";
  return "Buzz order: "+b.order.map((idx,r)=>`${r+1}. ${esc(state.players[idx]?state.players[idx].name:"?")}${(b.times&&b.times[idx]!=null)?` <span class="rt">${b.times[idx].toFixed(2)}s</span>`:""}`).join(" &middot; ");
}
function updateOrderUI(){ const el=$("#buzzOrder"); if(el) el.innerHTML=buzzOrderHTML(); }

/* ---------- Undo (last score change) ---------- */
function pushUndo(label){
  state.undo.push({ scores: state.players.map(p=>p.score), controlling: state.controlling, lastCorrect: state.lastCorrect, label: label||"score change" });
  if(state.undo.length>60) state.undo.shift();
}
function undoLast(){
  if(!state.undo.length){ toast("Nothing to undo."); return; }
  const u=state.undo.pop();
  const k=Math.min(u.scores.length, state.players.length);
  for(let j=0;j<k;j++) state.players[j].score=u.scores[j];
  state.controlling=u.controlling; state.lastCorrect=u.lastCorrect;
  pushScoresToPhones(); toast("Undid last score change.");
  if(state.screen==="board") renderBoard(); else if(state.screen==="clue") renderClue();
}

/* =======================================================================
   Networking: PeerJS host + phone controller
   ======================================================================= */
const Net = {
  peer:null, conns:{}, isHost:false,
  broadcast(msg){ Object.values(this.conns).forEach(c=>{ try{ if(c&&c.open) c.send(msg); }catch(e){} }); },
  stop(){ try{ Object.values(this.conns).forEach(c=>{try{c.close();}catch(e){}}); if(this.peer) this.peer.destroy(); }catch(e){} this.peer=null; this.conns={}; },
  hostStart(){
    if(typeof Peer==="undefined"){ state.net.status="error"; renderIfBoard(); return; }
    state.net.status="connecting"; renderIfBoard();
    ensureIce().then((servers)=>{
      let tries=0;
      const attempt=()=>{
        const code=makeCode(); const id=peerId(code);
        const peer=new Peer(id, peerOpts(servers));
        this.peer=peer;
        peer.on("open",()=>{ state.net.on=true; state.net.code=code; state.net.status="on"; renderIfBoard(); });
        peer.on("connection",(conn)=>{ this.attachConn(conn); });
        peer.on("error",(err)=>{
          const t=(err&&err.type)||"";
          if((t==="unavailable-id"||t==="invalid-id") && tries<4){ tries++; try{peer.destroy();}catch(e){} attempt(); return; }
          if(t==="peer-unavailable") return; // a phone tried a stale code; ignore
          state.net.status="error"; renderIfBoard();
        });
      };
      attempt();
    });
  },
  attachConn(conn){
    conn.on("open",()=>{ this.conns[conn.peer]=conn; });
    conn.on("data",(data)=>{ try{ handlePhoneData(conn,data); }catch(e){} });
    conn.on("close",()=>{ this.dropConn(conn.peer); });
    conn.on("error",()=>{ this.dropConn(conn.peer); });
  },
  dropConn(peerId){
    delete this.conns[peerId];
    const pl=state.players.find(p=>p.connId===peerId); if(pl) pl.connected=false;
    state.net.count=Object.keys(this.conns).length;
    renderIfBoard();
  }
};
function makeCode(){ const a="ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let s=""; for(let k=0;k<4;k++) s+=a[Math.floor(Math.random()*a.length)]; return s; }
function peerId(code){ return "jpdynight-"+code; }

function handlePhoneData(conn, data){
  if(!data||!data.type) return;
  if(data.type==="join"){
    const name=(data.name||"Player").toString().slice(0,24);
    const cid=(data.cid||"").toString().slice(0,40);
    let idx=state.players.findIndex(p=>p.connId===conn.peer);
    if(idx<0){
      // a returning phone: match by its stable id (survives reconnects/reloads),
      // or by name for older clients that send no id
      if(cid) idx=state.players.findIndex(p=>p.phone && p.cid===cid);
      else { idx=state.players.findIndex(p=>p.phone && p.name===name && p.connected===false);
             if(idx<0) idx=state.players.findIndex(p=>p.phone && p.name===name); }
    }
    if(idx>=0){
      const oldId=state.players[idx].connId;
      state.players[idx].connId=conn.peer;       // rebind to the new connection first
      state.players[idx].connected=true;
      state.players[idx].name=name;
      if(cid) state.players[idx].cid=cid;
      if(oldId && oldId!==conn.peer && Net.conns[oldId]){ try{ Net.conns[oldId].close(); }catch(e){} delete Net.conns[oldId]; }
    } else {
      state.players.push({name, score:0, phone:true, connId:conn.peer, connected:true, cid}); idx=state.players.length-1;
    }
    state.net.count=Object.keys(Net.conns).length;
    try{ conn.send({type:"welcome", index:idx, title:state.game?state.game.title:"Jeopardy", name:state.players[idx].name, score:state.players[idx].score}); }catch(e){}
    // send current buzz state (and mirrored clue, if on) to the newcomer
    sendBuzzStateTo(conn);
    if(state.net.mirror){ try{ conn.send(clueMirrorPayload()); }catch(e){} }
    renderIfBoard();
    return;
  }
  if(data.type==="buzz"){
    const pl=state.players.find(p=>p.connId===conn.peer);
    if(pl){ const i=state.players.indexOf(pl); buzzIn(i,"phone"); }
    return;
  }
}
function sendBuzzStateTo(conn){
  try{ conn.send(buzzStateMsg()); }catch(e){}
}
function pushScoresToPhones(){
  if(!state.net.on) return;
  state.players.forEach((p,i)=>{ if(p.phone&&p.connId&&Net.conns[p.connId]){ try{ Net.conns[p.connId].send({type:"score", score:p.score, index:i, name:p.name}); }catch(e){} } });
}
/* Optional: mirror the current clue to players' phones. Daily Doubles are never mirrored
   (only the controlling player should see them). */
function clueMirrorPayload(){
  if(state.screen==="final" && (state.finalStep==="clue" || state.finalStep==="reveal")){
    const f=state.game.final;
    return { type:"clue", cat:"Final Jeopardy"+(f.category?" - "+f.category:""), val:0, text:f.clue||"",
      mediaType:f.mediaType||"none", media:f.media||"", revealed: state.finalStep==="reveal", answer: state.finalStep==="reveal"?(f.answer||""):"" };
  }
  if(!state.clue) return {type:"clue", clear:true};
  const {ri,ci,ii}=state.clue;
  const clue=state.game.rounds[ri].categories[ci].clues[ii];
  if(clue.dailyDouble) return {type:"clue", clear:true};
  return { type:"clue", cat: state.game.rounds[ri].categories[ci].title||"", val: roundValues(ri)[ii],
    text: clue.clue||"", mediaType: clue.mediaType||"none", media: clue.media||"",
    revealed: !!state.clueRevealed, answer: state.clueRevealed ? (clue.answer||"") : "" };
}
function broadcastClue(){
  if(!state.net.on) return;
  Net.broadcast(state.net.mirror ? clueMirrorPayload() : {type:"clue", clear:true});
}
function renderIfBoard(){ if(state.screen==="board") renderBoard(); else if(state.screen==="setup") renderSetup(); }

const Ctrl = { peer:null, conn:null, code:null, index:null, name:"", score:0, mode:"idle", winner:null, winnerName:"", lockout:[], status:"", canRetry:false, _cid:null, clue:null, clock:null, _early:false, _armReady:true };

function clueCardHTML(){

function renderController(){
